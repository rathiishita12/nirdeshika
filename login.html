<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nirdeshika Login</title>
  <link rel="stylesheet" href="login.css" />
  <script src="login.js" defer type="module"></script>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet" />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>

<body>
  <div class="container">
    <div class="left-panel">
      <img src="logo.png" width="400px" alt="logo">
      <p>Your personalized pathway to success. Discover the right career path, gain skills, and reach your goals.</p>
    </div>

    <div class="right-panel">
      <div class="login-card">
        <h2>Login to Nirdeshika</h2>

        <form id="loginForm" onsubmit="return false;">
          <input type="email" id="email" placeholder="Email" required />
          <input type="password" id="password" placeholder="Password" required />

          <button type="submit" id="loginBtn">Login</button>
        </form>

        <div class="divider">
          <span>OR</span>
        </div>

        <button id="googleBtn" class="google-btn">
          <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg" alt="Google" />
          Sign up with Google
        </button>

        <p class="signup-text">Don't have an account? <a href="signup.html">Sign up</a></p>
      </div>
    </div>
  </div>
</body>

</html>
