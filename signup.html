<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nirdeshika Sign Up</title>
  <link rel="stylesheet" href="signup.css" />
  <script src="signup.js" defer type="module"></script>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>

<body>
  <div class="container">
    <div class="left-panel">
      <img src="logo.png" width="400px" alt="logo">
      <p>Your personalized pathway to success. Discover the right career path, gain skills, and reach your goals.</p>
    </div>

    <div class="right-panel">
      <div class="login-card">
        <h2>Sign Up To Nirdeshika</h2>

        <form id="signupForm" onsubmit="return false;">
          <input type="text" id="fullName" placeholder="Full Name" required />
          <input type="email" id="email" placeholder="Email" required />
          <input type="password" id="password" placeholder="Password" required />

          <button type="submit" id="signUpBtn">Sign Up</button>
        </form>
      </div>
    </div>
  </div>

  <!-- OTP Modal -->
  <div id="otpModal" class="modal" style="display: none;">
    <div class="modal-content">
      <span class="close-btn">&times;</span>
      <h3>Verify Your Email</h3>
      <p>Enter the OTP sent to your email</p>
      <input type="text" id="otpInput" placeholder="Enter OTP" />
      <button id="verifyOtpBtn">Verify</button>
    </div>
  </div>
</body>

</html>
