</head>

<body>
  <header class="profile-header">
    <nav>
      <div class="nav__bar">
        <div class="nav__logo">
          <a href="http://127.0.0.1:5500/"><img src="http://127.0.0.1:5500/logo.png" alt="logo"
              style="height: 70px; width:250px;"></a>
        </div>
        <ul class="nav__links">
          <li class="link"><a href="http://127.0.0.1:5500/">Home</a></li>
          <li class="link"><a href="http://127.0.0.1:5500/about.html">About Us</a></li>

          <!-- Services Dropdown -->
          <li class="link dropdown">
            <a href="#">Services ▾</a>
            <ul class="dropdown-menu">
              <li><a href="http://127.0.0.1:5050/">Take Assessment</a></li>
              <li><a href="http://127.0.0.1:5500/courses.html">Courses</a></li>
              <li><a href="http://127.0.0.1:5500/know-more.html">Know More</a></li>
            </ul>
          </li>

          <li class="link"><a href="http://127.0.0.1:5500/index.html#contact">Contact</a></li>
          <li class="link profile-link">
            <a href="http://127.0.0.1:5500/profile.html" aria-label="Profile">
              <i class="ri-user-line" style="font-size: 1.5rem; vertical-align: middle;"></i>
            </a>
          </li>
        </ul>
      </div>
    </nav>
  </header>

  <div class="profile-container">
    <div class="profile-card">
      <div class="profile-avatar">
        <i class="ri-user-smile-line"></i>
      </div>
      <h2 id="profileUsername">Loading...</h2>
      <p id="profileEmail" class="profile-email">Fetching details...</p>

      <div class="profile-stats">
        <div class="stat-box">
          <h4>0</h4>
          <p>Assessments Taken</p>
        </div>
      </div>

      <button id="logoutBtn" class="logout-btn">
        <i class="ri-logout-box-r-line"></i> Log Out
      </button>
    </div>
  </div>

  <section class="footer">
    <div class="footer__bar">
      Copyright © 2025 NISHNAT KUMAR RAJ & ISHITA RATHI. All rights reserved.
    </div>
  </section>

  <script src="profile.js"></script>
